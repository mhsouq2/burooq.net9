<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" width="560" height="480" role="img" aria-label="Illustration of a smart building secured by CCTV cameras, access control and a connected network">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E4EEFB"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="560" height="480" fill="url(#sky)" rx="24"/>

  <!-- Building -->
  <rect x="150" y="120" width="220" height="300" rx="6" fill="#0F3D63"/>
  <rect x="150" y="120" width="220" height="300" rx="6" fill="none" stroke="#0A2A45" stroke-width="2"/>
  <!-- windows grid -->
  <g fill="#1C6DD0">
    <rect x="172" y="150" width="30" height="30" rx="3"/>
    <rect x="216" y="150" width="30" height="30" rx="3"/>
    <rect x="260" y="150" width="30" height="30" rx="3"/>
    <rect x="304" y="150" width="30" height="30" rx="3"/>
    <rect x="172" y="200" width="30" height="30" rx="3"/>
    <rect x="216" y="200" width="30" height="30" rx="3"/>
    <rect x="260" y="200" width="30" height="30" rx="3"/>
    <rect x="304" y="200" width="30" height="30" rx="3"/>
    <rect x="172" y="250" width="30" height="30" rx="3"/>
    <rect x="216" y="250" width="30" height="30" rx="3"/>
    <rect x="260" y="250" width="30" height="30" rx="3"/>
    <rect x="304" y="250" width="30" height="30" rx="3" fill="#E8A33D"/>
  </g>
  <!-- door -->
  <rect x="235" y="350" width="50" height="70" rx="3" fill="#15202B"/>
  <circle cx="275" cy="385" r="3" fill="#E8A33D"/>

  <!-- CCTV camera arm -->
  <g>
    <rect x="370" y="140" width="14" height="50" fill="#15202B"/>
    <rect x="382" y="150" width="58" height="22" rx="6" fill="#15202B"/>
    <circle cx="436" cy="161" r="9" fill="#1C6DD0"/>
    <circle cx="436" cy="161" r="4" fill="#E4EEFB"/>
  </g>
  <!-- camera field of view -->
  <path d="M436 161 L500 230 L470 260 Z" fill="#1C6DD0" opacity=".15"/>

  <!-- signal waves from rooftop -->
  <g stroke="#E8A33D" stroke-width="3" fill="none" opacity=".8">
    <path d="M250 100 Q260 70 270 100"/>
    <path d="M240 100 Q260 50 280 100"/>
    <path d="M230 100 Q260 30 290 100"/>
  </g>
  <rect x="255" y="98" width="10" height="22" fill="#0A2A45"/>

  <!-- network nodes -->
  <g>
    <circle cx="80" cy="380" r="16" fill="#FFFFFF" stroke="#1C6DD0" stroke-width="3"/>
    <circle cx="80" cy="380" r="5" fill="#1C6DD0"/>
    <circle cx="60" cy="320" r="10" fill="#FFFFFF" stroke="#E8A33D" stroke-width="3"/>
    <circle cx="120" cy="320" r="10" fill="#FFFFFF" stroke="#E8A33D" stroke-width="3"/>
    <line x1="80" y1="380" x2="60" y2="320" stroke="#CBD3DC" stroke-width="2"/>
    <line x1="80" y1="380" x2="120" y2="320" stroke="#CBD3DC" stroke-width="2"/>
    <line x1="80" y1="364" x2="150" y2="350" stroke="#CBD3DC" stroke-width="2" stroke-dasharray="4 4"/>
  </g>

  <!-- ground -->
  <rect x="0" y="420" width="560" height="60" fill="#F5F7FA"/>
</svg>
